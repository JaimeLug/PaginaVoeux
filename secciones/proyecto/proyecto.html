<!-- Hero: soporta video (heroVideo) o imagen (heroImg) según el proyecto -->
<section class="project-hero">
    <div class="hero-bg">
        <!-- Video hero (proyectos con video en lugar de foto) -->
        <div id="vimeo-hero-container" class="project-hero-video" style="display:none; overflow:hidden; position:relative; width:100%; height:100%;">
            <iframe id="project-hero-vimeo" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" style="position:absolute;top:50%;left:50%;width:100vw;height:56.25vw;min-height:100vh;min-width:177.78vh;transform:translate(-50%, -50%);pointer-events:none;" title="Vimeo Project Hero"></iframe>
        </div>
        <!-- Imagen hero (proyectos con fotografía) -->
        <img id="project-hero-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 9' fill='%23111'%3E%3C/svg%3E" alt="" class="project-hero-img">
        <div class="hero-overlay"></div>
    </div>
    <div class="hero-content">
        <span id="project-brand" class="project-brand"></span>
        <h1 id="project-title" class="project-title"></h1>
    </div>
</section>

<!-- Info -->
<section class="project-info">
    <div class="info-description">
        <div id="project-description"></div>
        <p id="project-highlight" class="highlight-text" style="display:none;"></p>
    </div>
    <div class="info-specs">
        <ul class="specs-list">
            <li><span class="spec-label">CLIENTE:</span> <span id="spec-cliente"></span></li>
            <li><span class="spec-label">SERVICIOS:</span> <span id="spec-servicios"></span></li>
            <li><span class="spec-label">AÑO:</span> <span id="spec-anio"></span></li>
        </ul>
    </div>
</section>

<!-- Dynamic Content Blocks -->
<section id="project-dynamic-content" class="project-dynamic-content">
    <!-- Las imágenes, videos y carruseles se inyectan dinámicamente desde proyecto.js mediante widgets -->
</section>
