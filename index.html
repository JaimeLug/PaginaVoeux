<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voeux Media</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Carga CSS Global -->
    <link rel="stylesheet" href="css/global.css">
    <!-- Vimeo API -->
    <script src="https://player.vimeo.com/api/player.js"></script>
</head>
<body class="preload">
    <!-- SPA Shell Structure -->
    <div class="app-container">
        
        <!-- Contenedor del Header -->
        <header class="header" id="header-container"></header>

        <!-- Contenedor principal de vistas (Aquí se inyecta Inicio, Proyectos, etc.) -->
        <main id="app-content"></main>

        <!-- Contenedor del Footer Global -->
        <div id="footer-container"></div>

    </div>
    
    <!-- Contenedor del Side Menu -->
    <div id="menu-container"></div>

    <!-- Script Orquestador -->
    <script src="js/app.js"></script>

    <!-- Cookie Banner Global -->
    <div id="cookie-banner" class="cookie-banner" style="display: none;">
        <span>Utilizamos cookies, incluyendo cookies de terceros, por razones funcionales y para análisis estadístico. Para más información, por favor <a href="#/privacidad">haz clic aquí</a>.</span>
        <div class="cookie-buttons">
            <button id="btn-config-cookies">CONFIGURACIÓN DE COOKIES</button>
            <button id="btn-accept-cookies">ACEPTAR COOKIES</button>
        </div>
    </div>
</body>
</html>
